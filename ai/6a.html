# working of Alpha-Beta Pruning 
#min-max 
 
def min_max(node, depth, maximizing=True):
    if depth == 0 or 'children' not in node:
        return node['value']
    
    values = [min_max(child, depth - 1, not maximizing) for child in node.get('children', [])]
    
    return max(values) if maximizing else min(values)

game_tree = {
    'root': {
        'value': None,
        'children': [
            {
                'value': None,
                'children': [
                    {'value': 3},
                    {'value': 12},
                    {'value': 8}
                ]
            },
            {
                'value': None,
                'children': [
                    {'value': 2},
                    {'value': 4},
                    {'value': 6}
                ]
            }
        ]
    }
}

optimal_value = min_max(game_tree['root'], depth=3)
print("Optimal Value:", optimal_value)
