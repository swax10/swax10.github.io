          CREATE TABLE CampaignManagers (
            ManagerID INT PRIMARY KEY AUTO_INCREMENT,
            ManagerName VARCHAR(50) NOT NULL,
            ManagerEmail VARCHAR(50) NOT NULL,
            ManagerContactNumber VARCHAR(20) NOT NULL,
            ManagerProfile VARCHAR(100) NOT NULL,
            ManagerAddress VARCHAR(100) NOT NULL
          );
          
          CREATE TABLE Projects (
            ProjectID INT PRIMARY KEY AUTO_INCREMENT,
            ProjectTitle VARCHAR(100) NOT NULL,
            ProjectDescription TEXT NOT NULL,
            FundingGoal DECIMAL(10, 2) NOT NULL,
            ProjectStartDate DATE NOT NULL,
            ProjectEndDate DATE NOT NULL,
            FundraisingProgress DECIMAL(10, 2) NOT NULL,
            ProjectType ENUM('physical', 'digital') NOT NULL,
            DeliveryLocation VARCHAR(100),
            DeliveryDate DATE,
            DigitalDeliveryMethod VARCHAR(100),
            DigitalDeliveryDate DATE,
            CampaignManagerID INT NOT NULL,
            FOREIGN KEY (CampaignManagerID) REFERENCES CampaignManagers (ManagerID)
          );
          
          CREATE TABLE Contributors (
            ContributorID INT PRIMARY KEY AUTO_INCREMENT,
            ContributorName VARCHAR(50) NOT NULL,
            ContributorEmail VARCHAR(50) NOT NULL,
            ContributorContactNumber VARCHAR(20) NOT NULL,
            ContributorProfile VARCHAR(100) NOT NULL,
            ContributorAddress VARCHAR(100) NOT NULL
          );
          
          CREATE TABLE Rewards (
            RewardID INT PRIMARY KEY AUTO_INCREMENT,
            RewardTitle VARCHAR(100) NOT NULL,
            RewardDescription TEXT NOT NULL,
            RewardAmount DECIMAL(10, 2) NOT NULL,
            RewardQuantity INT NOT NULL,
            RewardDeliveryDate DATE,
            ProjectID INT NOT NULL,
            FOREIGN KEY (ProjectID) REFERENCES Projects (ProjectID)
          );
          
          CREATE TABLE Payments (
            PaymentID INT PRIMARY KEY AUTO_INCREMENT,
            PaymentDate DATE NOT NULL,
            PaymentMethod ENUM('credit card', 'debit card', 'paypal') NOT NULL,
            PaymentAmount DECIMAL(10, 2) NOT NULL,
            PaymentStatus ENUM('pending', 'paid', 'refunded') NOT NULL,
            ContributorID INT NOT NULL,
            ProjectID INT NOT NULL,
            RewardID INT NOT NULL,
            FOREIGN KEY (ContributorID) REFERENCES Contributors (ContributorID),
            FOREIGN KEY (ProjectID) REFERENCES Projects (ProjectID),
            FOREIGN KEY (RewardID) REFERENCES Rewards (RewardID)
          );
