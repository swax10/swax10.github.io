                #include<stdio.h> 
#include<conio.h> 
#define n 100 
struct que 
{ 
int f,r; 
int queue[n]; 
}q; 
void add(); 
void del(); 
void display(); 
void main() 
{ 
char choice;
int option; 
clrscr(); 
q.f=-1; 
q.r=-1; 
do 
 { 
 printf("1.ADD\n"); 
 printf("2.DELETE\n"); 
 printf("3.DISPLAY\n"); 
 printf("Enter your option\n");  scanf("%d",&option); 
 switch(option) 
{ 
 case 1:add(); 
 break; 
 case 2:del(); 
 break; 
 case 3:display(); 
 break; 
 default:printf("Invalid Option\n"); } 
printf("Press 'Y' to continue\n"); choice=getch(); 
 } 
while(choice=='Y' || choice=='y'); } 
void add() 
{ 
int x; 
if(q.r==n-1) 
printf("Queue Overflow\n"); 
else 
{ 
printf("Enter value to be added\n"); scanf("%d",&x); 
q.r++;
q.queue[q.r]=x; 
if(q.r==0) 
q.f++; 
printf("Value added successfully\n"); } 
} 
void del() 
{ 
int x; 
if(q.f==-1) 
 printf("Queue Underflow\n"); 
 else 
 { 
 x=q.queue[q.f]; 
 printf("Value Deleted=%d\n",x);  if(q.f==q.r) 
 { 
 q.f=-1; 
 q.r=-1; 
 } 
 else 
 q.f++; 
 } 
} 
void display() 
{ 
int i; 
if(q.f==-1) 
 printf("Queue Underflow\n"); 
 else 
 for(i=q.f;i<=q.r;i++) 
 { 
 printf("%d\t",q.queue[i]); 
 }
}
