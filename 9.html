                #include <stdio.h>  
                #include <stdlib.h>  
                void push();  
                void pop();  
                void display();  
                struct node   
                {  
                int val;  
                struct node *next;  
                };  
                struct node *head;  
                void main ()  
                {  
                    int choice=0;       
                    while(choice != 4)  
                    {  
                        printf("\nStack Operations:-\n");  
                        printf("\n1.Push\n2.Pop\n3.Show\n4.Exit");  
                        printf("\n Enter your choice \n");        
                        scanf("%d",&choice);  
                        switch(choice)  
                        {  
                            case 1:  
                            {   
                                push();  
                                break;  
                            }  
                            case 2:  
                            {  
                                pop();  
                                break;  
                            }  
                            case 3:  
                            {  
                                display();  
                                break;  
                            }  
                            case 4:   
                            {    
                                break;   
                            }  
                            default:  
                            {  
                                printf("Please Enter valid choice ");  
                            }   
                        }  
                    }  
                }  
                void push ()  
                {  
                    int value;
                    struct node *ptr;  
                    ptr = (struct node *)malloc(sizeof(struct node));   
                    if(ptr == NULL)  
                    {  
                        printf("not able to push the element");   
                    }  
                    else   
                    {  
                        printf("Enter the value to be pushed: ");   
                        scanf("%d",&value);  
                        if(head==NULL)  
                        {         
                            ptr->val = value;  
                            ptr -> next = NULL;  
                            head=ptr;  
                        }   
                        else   
                        {  
                            ptr->val = value;  
                            ptr->next = head;  
                            head=ptr;     
                        }  
                        printf("Item pushed in Stack: %d",value);    
                    }  
                }  
                void pop()  
                {  
                    int item;  
                    struct node *ptr;  
                    if (head == NULL)  
                    {  
                        printf("Stack is empty\n");  
                    }  
                    else  
                    {  
                        item = head->val;  
                        ptr = head;  
                        head = head->next;  
                        free(ptr);  
                        printf("Item popped from stack: %d",item);       
                    }  
                }  
                void display()  
                {  
                    int i;  
                    struct node *ptr;  
                    ptr=head;  
                    if(ptr == NULL)  
                    {  
                        printf("Stack is empty\n");  
                    }  
                    else  
                    {  
                        printf("Elements of the stack are :\n");  
                        while(ptr!=NULL)  
                        {  
                            printf("%d\n",ptr->val);  
                            ptr = ptr->next;  
                        }  
                    }  
                }
